<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="NormalCalculator.css">
    <title>Document</title>
</head>
<body>
    <div id="container">
       <input id="display" readonly>
       <div id="keys">
        <button onclick="keysDisplay('+')"class="operator">+</button>
        <button onclick="keysDisplay('7')">7</button>
        <button onclick="keysDisplay('8')">8</button>
        <button onclick="keysDisplay('9')">9</button>
        <button onclick="keysDisplay('-')"class="operator">-</button>
        <button onclick="keysDisplay('4')">4</button>
        <button onclick="keysDisplay('5')">5</button>
        <button onclick="keysDisplay('6')">6</button>
        <button onclick="keysDisplay('*')"class="operator">*</button>
        <button onclick="keysDisplay('1')">1</button>
        <button onclick="keysDisplay('2')">2</button>
        <button onclick="keysDisplay('3')">3</button>
        <button onclick="keysDisplay('/')"class="operator">/</button>
        <button onclick="keysDisplay('0')">0</button>
        <button onclick="keysDisplay('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="cleartxt()"class="operator">C</button>
        <button onclick="deletetxt()"class="Delete">⌫</button>
       </div> 
    </div>
    <script src="NormalCalculator.js"></script>
</body>
</html>
